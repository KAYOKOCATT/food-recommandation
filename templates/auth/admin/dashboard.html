{% extends "layout.html" %}
{% block content %}
  <div class="page-content">
    <div class="page-title-box">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-md-8">
            <h4 class="page-title mb-1">管理员后台</h4>
            <ol class="breadcrumb m-0">
              <li class="breadcrumb-item active">后台总览</li>
            </ol>
          </div>
        </div>
      </div>
    </div>
    <div class="page-content-wrapper">
      <div class="container-fluid">
        <div class="card mb-4">
          <div class="card-body">
            <h4 class="card-title mb-3">当前管理员</h4>
            <p class="text-muted mb-0">
              当前演示身份：{{ admin_user.username }}。第一版后台已提供核心业务表 CRUD 入口。
            </p>
          </div>
        </div>
        {% for section in cards %}
          <div class="mb-4">
            <h5 class="mb-3">{{ section.group }}</h5>
            <div class="row">
              {% for item in section.items %}
                <div class="col-md-4 mb-3">
                  <div class="card h-100 border">
                    <div class="card-body d-flex flex-column">
                      <div class="d-flex justify-content-between align-items-start mb-3">
                        <h5 class="mb-0">{{ item.label }}</h5>
                        <span class="badge badge-primary">{{ item.count }}</span>
                      </div>
                      <a href="{% url item.url_name %}" class="btn btn-outline-primary mt-auto">进入管理</a>
                    </div>
                  </div>
                </div>
              {% endfor %}
            </div>
          </div>
        {% endfor %}
      </div>
    </div>
  </div>
{% endblock content %}
