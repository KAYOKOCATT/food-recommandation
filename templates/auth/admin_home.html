{% extends "layout.html" %}
{% block content %}
  <div class="page-content">
    <div class="page-title-box">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-md-8">
            <h4 class="page-title mb-1">管理员首页</h4>
            <ol class="breadcrumb m-0">
              <li class="breadcrumb-item active">后台入口</li>
            </ol>
          </div>
        </div>
      </div>
    </div>
    <div class="page-content-wrapper">
      <div class="container-fluid">
        <div class="card">
          <div class="card-body">
            <h4 class="card-title mb-3">管理员演示身份</h4>
            <p class="text-muted mb-4">
              当前账号：{{ admin_user.username }}。本页是项目内后台入口占位页，后续 CRUD 面板从这里继续扩展。
            </p>
            <div class="row">
              <div class="col-md-4">
                <div class="border rounded p-3 h-100">
                  <h5 class="mb-2">用户与认证</h5>
                  <p class="text-muted mb-0">预留 `User`、登录链路、演示身份管理入口。</p>
                </div>
              </div>
              <div class="col-md-4 mt-3 mt-md-0">
                <div class="border rounded p-3 h-100">
                  <h5 class="mb-2">中文菜品数据</h5>
                  <p class="text-muted mb-0">预留 `Foods`、`Collect`、`Comment` 管理入口。</p>
                </div>
              </div>
              <div class="col-md-4 mt-3 mt-md-0">
                <div class="border rounded p-3 h-100">
                  <h5 class="mb-2">Yelp 数据</h5>
                  <p class="text-muted mb-0">预留 `YelpBusiness`、`YelpReview` 管理入口。</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
