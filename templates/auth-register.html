{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Register 注册</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="Premium Multipurpose Admin & Dashboard Template"
          name="description">
    <meta content="Themesdesign" name="author">
    <meta name="keywords" content="餐饮推荐系统">
    <!-- Bootstrap Css -->
    <link href="{% static 'css/bootstrap.min.css' %}"
          rel="stylesheet"
          type="text/css">
    <!-- Icons Css -->
    <link href="{% static 'css/icons.min.css' %}"
          rel="stylesheet"
          type="text/css">
    <!-- App Css-->
    <link href="{% static 'css/app.min.css' %}"
          rel="stylesheet"
          type="text/css">
    <style>
      .form-control.text-center {
        text-align: center;
      }
      .form-group-custom .form-control {
        border-radius: 0.75rem;
        padding: 1rem 1rem;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .form-group-custom .form-control:focus {
        border-color: #28a745;
        box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.12);
      }
    </style>
  </head>
  <body class="bg-primary bg-pattern">
    <div class="home-btn d-none d-sm-block">
      <a href=""><i class="mdi mdi-home-variant h2 text-white"></i></a>
    </div>
    <div class="account-pages my-5 pt-sm-5">
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            <div class="text-center mb-5">
              <h2 class="font-size-100 text-white mb-4">餐饮推荐系统</h2>
            </div>
          </div>
        </div>
        <!-- end row -->
        <div class="row justify-content-center">
          <div class="col-xl-5 col-sm-8">
            <div class="card">
              <div class="card-body p-4">
                <div class="p-2">
                  <h5 class="mb-5 text-center">注册账户</h5>
                  <form class="form-horizontal"
                        action="{% url 'register' %}"
                        method="post"
                        id="register-form">
                    {% csrf_token %}
                    <div class="row">
                      <div class="col-md-12">
                        <div class="form-group form-group-custom mb-4">
                          <input type="text"
                                class="form-control text-center"
                                id="username"
                                name="username"
                                placeholder="用户名"
                                required="">
                          <label for="username">用户名</label>
                        </div>
                        <div class="form-group form-group-custom mb-4">
                          <input type="password"
                                class="form-control text-center"
                                id="userpassword"
                                name="userpassword"
                                placeholder="密码"
                                required="">
                          <label for="userpassword">密码</label>
                        </div>
                        <div class="form-group form-group-custom mb-4">
                          <input type="tel"
                                class="form-control text-center"
                                id="userphone"
                                name="userphone"
                                placeholder="手机号"
                                required=""
                                pattern="[0-9]{11}">
                          <label for="userphone">手机号</label>
                        </div>
                        <div class="form-group form-group-custom mb-4">
                          <input type="email"
                                class="form-control text-center"
                                id="email"
                                name="email"
                                placeholder="邮箱"
                                required="">
                          <label for="useremail">邮箱</label>
                        </div>
                        <div class="mt-4">
                          <button class="btn btn-success btn-block waves-effect waves-light"
                                  type="submit">注册</button>
                        </div>
                        <div class="mt-4 text-center ">
                          <a href="{% url 'login' %}" class="text-muted" ><i class="mdi mdi-account-circle mr-1"></i>已有账号？点击前往登录</a>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- end row -->
      </div>
    </div>
    <!-- end Account pages -->
    <!-- JAVASCRIPT -->
    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/metisMenu.min.js' %}"></script>
    <script src="{% static 'js/simplebar.min.js' %}"></script>
    <script src="{% static 'js/waves.min.js' %}"></script>
    <script src="{% static 'js/bundle.js' %}"></script>
    <script src="{%static 'js/app.js' %}"></script>
    <script>
            $(document).ready(function() {
                $('#register-form').on('submit',function(event) {
                    event.preventDefault();
                    var username = $('#username').val();
                    var password = $('#userpassword').val();
                    var phone = $('#userphone').val();
                    var email = $('#email').val();

                    if (username === '' || password === ''|| phone === '') {
                        alert('用户名，密码和电话不能为空');
                        return;
                }
                    if (!/^1[3456789]\d{9}$/.test(phone)) {
                        alert('请输入有效的手机号码');
                        return;
                    }

                    if (password.length < 5 || password.length > 16) {
                        alert('密码长度必须在5到16个字符之间');
                        return;
                    }

                    if (!/^([a-zA-Z0-9_-])+@([a-zA-Z0-9_-])+((\.[a-zA-Z0-9_-]{2,3}){1,2})$/.test(email)) {
                        alert('请输入有效的邮箱地址');
                        return;
                    }

                $.ajax({
                    type: 'POST',
                    url:'/myapp/register/',
                    data:{
                        username:username,
                        password:password,
                        phone:phone,
                        email:email,
                        csrfmiddlewaretoken:$('input[name=csrfmiddlewaretoken]').val(),
                    },
                    success:function(data){
                        if(data.error){
                            alert(data.error);
                        }else {
                            alert('注册成功');
                            window.location.href = "/myapp/login/";
                    }
                },
                error:function(xhr,status,error){
                    alert('注册失败');
                }
                });
                });
            });
    </script>
  </body>
</html>
