{% extends "base_chart.html" %}
{% load static %}

{% block content %}
<div class="container-fluid" x-data="dashboardChart()" x-init="init()">
  <!-- 页面标题 -->
  <div class="row">
    <div class="col-12">
      <div class="page-title-box d-flex align-items-center justify-content-between">
        <h4 class="mb-0 font-size-18">数据可视化仪表板</h4>
        <div class="page-title-right">
          <ol class="breadcrumb m-0">
            <li class="breadcrumb-item"><a href="{% url 'user_home' %}">首页</a></li>
            <li class="breadcrumb-item active">数据可视化</li>
          </ol>
        </div>
      </div>
    </div>
  </div>

  <!-- 图表网格 2x2 -->
  <div class="row">
    <!-- 图表1: 菜品分类统计 -->
    <div class="col-xl-6 col-lg-12">
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="card-title">菜品分类分布与价格分析</h4>
            <button class="btn btn-sm btn-outline-primary"
                    hx-get="/api/v1/charts/food-category-stats/"
                    hx-target="#chart1-data"
                    @htmx:afterRequest="updateChart1(event)">
              <i class="mdi mdi-refresh"></i> 刷新
            </button>
          </div>
          <div id="chart1" style="height: 350px;"></div>
          <div id="chart1-data" class="d-none"></div>
        </div>
      </div>
    </div>

    <!-- 图表2: 用户行为趋势 -->
    <div class="col-xl-6 col-lg-12">
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="card-title">用户行为时间趋势</h4>
            <div class="btn-group">
              <button class="btn btn-sm btn-outline-secondary" @click="days = 7; loadChart2()">7天</button>
              <button class="btn btn-sm btn-outline-secondary" @click="days = 30; loadChart2()">30天</button>
              <button class="btn btn-sm btn-outline-primary" @click="loadChart2()">
                <i class="mdi mdi-refresh"></i>
              </button>
            </div>
          </div>
          <div id="chart2" style="height: 350px;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-4">
    <!-- 图表3: 餐厅地理分布 -->
    <div class="col-xl-6 col-lg-12">
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="card-title">美国餐厅地理分布与评分热力图</h4>
            <div class="d-flex gap-2">
              <select class="form-select form-select-sm" style="width: 100px;" x-model="geoLimit">
                <option value="500">500家</option>
                <option value="1000">1000家</option>
                <option value="2000">2000家</option>
              </select>
              <button class="btn btn-sm btn-outline-primary" @click="loadChart3()">
                <i class="mdi mdi-refresh"></i>
              </button>
            </div>
          </div>
          <div id="chart3" style="height: 400px;"></div>
          <p class="text-muted text-center mt-2 mb-0" style="font-size: 12px;">
            <i class="mdi mdi-information-outline"></i>
            颜色深浅表示评分，圆点大小表示评论数
          </p>
        </div>
      </div>
    </div>

    <!-- 图表4: 相似度网络图 -->
    <div class="col-xl-6 col-lg-12">
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="card-title">推荐相似度网络图</h4>
            <div class="d-flex gap-2">
              <select class="form-select form-select-sm" style="width: 80px;" x-model="networkLimit">
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
              <button class="btn btn-sm btn-outline-primary" @click="loadChart4()">
                <i class="mdi mdi-refresh"></i>
              </button>
            </div>
          </div>
          <div id="chart4" style="height: 400px;"></div>
          <p class="text-muted text-center mt-2 mb-0" style="font-size: 12px;">
            <i class="mdi mdi-information-outline"></i>
            节点可拖拽，滚轮缩放，相似度 > 0.5 显示连线
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}

{% block chart_scripts %}
<script>
  const usaMapUrl = "{% static 'geo/usa.json' %}";

  // Alpine.js Dashboard Component
  document.addEventListener('alpine:init', () => {
    Alpine.data('dashboardChart', () => ({
      days: 30,
      geoLimit: 1000,
      networkLimit: 100,
      chart1: null,
      chart2: null,
      chart3: null,
      chart4: null,

      init() {
        this.initCharts();
        this.loadAllData();
      },

      initCharts() {
        // 图表1: 分组柱状图+折线混合
        this.chart1 = echarts.init(document.getElementById('chart1'));
        this.chart1.setOption({
          tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'cross' }
          },
          legend: {
            data: ['平均价格', '平均收藏数'],
            bottom: 0
          },
          grid: {
            left: '3%',
            right: '3%',
            bottom: '15%',
            top: '10%',
            containLabel: true
          },
          xAxis: {
            type: 'category',
            data: [],
            axisLabel: { rotate: 30, fontSize: 10 }
          },
          yAxis: [
            {
              type: 'value',
              name: '价格(元)',
              position: 'left',
              axisLabel: { color: '#5470c6' }
            },
            {
              type: 'value',
              name: '收藏数',
              position: 'right',
              axisLabel: { color: '#91cc75' }
            }
          ],
          series: [
            {
              name: '平均价格',
              type: 'bar',
              data: [],
              itemStyle: { color: '#5470c6' },
              barWidth: '50%'
            },
            {
              name: '平均收藏数',
              type: 'line',
              yAxisIndex: 1,
              data: [],
              itemStyle: { color: '#91cc75' },
              smooth: true
            }
          ]
        });

        // 图表2: 多系列折线图
        this.chart2 = echarts.init(document.getElementById('chart2'));
        this.chart2.setOption({
          tooltip: {
            trigger: 'axis'
          },
          legend: {
            data: ['新用户注册', '新增收藏', '新增评论'],
            bottom: 0
          },
          grid: {
            left: '3%',
            right: '3%',
            bottom: '15%',
            top: '10%',
            containLabel: true
          },
          xAxis: {
            type: 'category',
            boundaryGap: false,
            data: [],
            axisLabel: { rotate: 30, fontSize: 10 }
          },
          yAxis: {
            type: 'value',
            minInterval: 1
          },
          series: [
            {
              name: '新用户注册',
              type: 'line',
              data: [],
              smooth: true,
              itemStyle: { color: '#5470c6' },
              areaStyle: { opacity: 0.1 }
            },
            {
              name: '新增收藏',
              type: 'line',
              data: [],
              smooth: true,
              itemStyle: { color: '#91cc75' },
              areaStyle: { opacity: 0.1 }
            },
            {
              name: '新增评论',
              type: 'line',
              data: [],
              smooth: true,
              itemStyle: { color: '#fac858' },
              areaStyle: { opacity: 0.1 }
            }
          ]
        });

        // 图表3: 地理散点图
        this.chart3 = echarts.init(document.getElementById('chart3'));

        // 图表4: 力导向图
        this.chart4 = echarts.init(document.getElementById('chart4'));

        // 响应式调整
        window.addEventListener('resize', () => {
          this.chart1 && this.chart1.resize();
          this.chart2 && this.chart2.resize();
          this.chart3 && this.chart3.resize();
          this.chart4 && this.chart4.resize();
        });
      },

      loadAllData() {
        this.loadChart1();
        this.loadChart2();
        this.loadChart3();
        this.loadChart4();
      },

      // 加载图表1数据
      loadChart1() {
        fetch('/api/v1/charts/food-category-stats/')
          .then(res => res.json())
          .then(result => {
            if (result.code === 200 && result.data) {
              this.chart1.setOption({
                xAxis: { data: result.data.categories },
                series: [
                  { data: result.data.avgPrices },
                  { data: result.data.avgCollects }
                ]
              });
            }
          })
          .catch(err => console.error('Chart1 load error:', err));
      },

      // 加载图表2数据
      loadChart2() {
        fetch(`/api/v1/charts/user-activity-trend/?days=${this.days}`)
          .then(res => res.json())
          .then(result => {
            if (result.code === 200 && result.data) {
              this.chart2.setOption({
                xAxis: { data: result.data.dates },
                series: [
                  { data: result.data.registrations },
                  { data: result.data.collects },
                  { data: result.data.comments }
                ]
              });
            }
          })
          .catch(err => console.error('Chart2 load error:', err));
      },

      // 加载图表3数据
      loadChart3() {
        fetch(usaMapUrl)
          .then(res => res.json())
          .then(usaJson => {
            echarts.registerMap('usa', usaJson);
            return fetch(`/api/v1/charts/restaurant-geo/?limit=${this.geoLimit}`);
          })
          .then(res => res.json())
          .then(result => {
            if (result.code === 200 && result.data) {
              this.chart3.setOption({
                tooltip: {
                  trigger: 'item',
                  formatter: function(params) {
                    const v = params.value;
                    return `${params.name}<br/>
                            评分: ${v[2]}<br/>
                            评论数: ${v[3]}<br/>
                            城市: ${params.data.city || 'N/A'}, ${params.data.state || ''}`;
                  }
                },
                visualMap: {
                  min: 1,
                  max: 5,
                  left: 'left',
                  top: 'bottom',
                  text: ['高评分', '低评分'],
                  calculable: true,
                  inRange: {
                    color: ['#e0f3f8', '#abd9e9', '#74add1', '#4575b4', '#313695']
                  }
                },
                geo: {
                  map: 'usa',
                  roam: true,
                  itemStyle: {
                    areaColor: '#f3f3f3',
                    borderColor: '#999'
                  },
                  emphasis: {
                    itemStyle: {
                      areaColor: '#e6e6e6'
                    }
                  }
                },
                series: [{
                  name: '餐厅分布',
                  type: 'scatter',
                  coordinateSystem: 'geo',
                  data: result.data,
                  symbolSize: function(val) {
                    return Math.max(5, Math.min(30, Math.log(val[3] + 1) * 3));
                  },
                  itemStyle: {
                    shadowBlur: 10,
                    shadowColor: 'rgba(0, 0, 0, 0.3)'
                  }
                }]
              });
            }
          })
          .catch(err => console.error('Chart3 load error:', err));
      },

      // 加载图表4数据
      loadChart4() {
        fetch(`/api/v1/charts/similarity-network/?limit=${this.networkLimit}&threshold=0.5`)
          .then(res => res.json())
          .then(result => {
            if (result.code === 200 && result.data) {
              const data = result.data;

              this.chart4.setOption({
                tooltip: {
                  trigger: 'item',
                  formatter: function(params) {
                    if (params.dataType === 'edge') {
                      return `相似度: ${params.data.value}`;
                    }
                    return `${params.data.name}<br/>分类: ${params.data.category}`;
                  }
                },
                legend: {
                  data: data.categories ? data.categories.map(c => c.name) : [],
                  top: 10,
                  textStyle: { fontSize: 10 }
                },
                series: [{
                  type: 'graph',
                  layout: 'force',
                  data: data.nodes,
                  links: data.links,
                  categories: data.categories,
                  roam: true,
                  label: {
                    show: false
                  },
                  force: {
                    repulsion: 100,
                    gravity: 0.1,
                    edgeLength: [50, 200]
                  },
                  lineStyle: {
                    color: 'source',
                    curveness: 0.3,
                    width: function(params) {
                      return params.data.value * 3;
                    }
                  },
                  emphasis: {
                    focus: 'adjacency',
                    lineStyle: {
                      width: 5
                    }
                  }
                }]
              });
            }
          })
          .catch(err => console.error('Chart4 load error:', err));
      }
    }));
  });

  // HTMX 响应处理器
  function updateChart1(event) {
    if (event.detail.success) {
      try {
        const result = JSON.parse(event.detail.xhr.responseText);
        if (result.code === 200 && result.data) {
          const chart = echarts.getInstanceByDom(document.getElementById('chart1'));
          if (chart) {
            chart.setOption({
              xAxis: { data: result.data.categories },
              series: [
                { data: result.data.avgPrices },
                { data: result.data.avgCollects }
              ]
            });
          }
        }
      } catch (e) {
        console.error('Chart1 update error:', e);
      }
    }
  }
</script>
{% endblock chart_scripts %}
